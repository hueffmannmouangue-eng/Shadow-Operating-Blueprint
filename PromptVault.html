<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROMPT VAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #04030e;
  --bg2:      #080618;
  --sidebar:  #050412;
  --p1:       #50207A;
  --p2:       #7435aa;
  --p3:       #838CE5;
  --lav:      #D6B9FC;
  --t1:       #f0ecff;
  --t2:       #a898cc;
  --t3:       #4e4870;
  --bd:       rgba(131,140,229,.11);
  --bdhov:    rgba(214,185,252,.30);
  --glass:    rgba(80,32,122,.09);
  --glasshov: rgba(80,32,122,.20);
  --sw:       268px;
  --hd:       52px;
  --r:        11px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t1);overflow:hidden}

/* ── AMBIENT PARTICLES ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 55% at 6% -4%, rgba(80,32,122,.32) 0%,transparent 55%),
    radial-gradient(ellipse 50% 42% at 97% 102%, rgba(131,140,229,.18) 0%,transparent 55%),
    radial-gradient(ellipse 28% 28% at 50% 48%, rgba(155,109,232,.06) 0%,transparent 65%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle 1px at 20% 30%, rgba(214,185,252,.18) 0%,transparent 1px),
    radial-gradient(circle 1px at 70% 15%, rgba(131,140,229,.15) 0%,transparent 1px),
    radial-gradient(circle 1px at 85% 65%, rgba(214,185,252,.12) 0%,transparent 1px),
    radial-gradient(circle 1px at 35% 80%, rgba(131,140,229,.10) 0%,transparent 1px),
    radial-gradient(circle 1.5px at 55% 40%, rgba(214,185,252,.14) 0%,transparent 1.5px),
    radial-gradient(circle 1px at 12% 70%, rgba(131,140,229,.10) 0%,transparent 1px);
}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;position:relative;z-index:1}

/* ══════════ SIDEBAR ══════════ */
#sidebar{
  width:var(--sw);min-width:var(--sw);height:100vh;
  background:var(--sidebar);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  overflow:hidden;flex-shrink:0;
  transition:transform .32s cubic-bezier(.4,0,.2,1);
}

/* Brand */
.sb-brand{
  padding:18px 16px 14px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.sb-logo{
  width:33px;height:33px;border-radius:9px;
  background:linear-gradient(135deg,var(--p1),var(--p3));
  display:flex;align-items:center;justify-content:center;font-size:14px;
  box-shadow:0 0 22px rgba(131,140,229,.42),0 0 8px rgba(80,32,122,.6);
  flex-shrink:0;position:relative;overflow:hidden;
}
.sb-logo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
}
.sb-title{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:.07em;
  background:linear-gradient(110deg,#fff 20%,var(--lav) 65%,var(--p3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sb-sub{font-size:9px;color:var(--t3);letter-spacing:.18em;text-transform:uppercase;margin-top:2px}

/* Search */
.sb-search-wrap{padding:10px 12px 9px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-search{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.03);border:1px solid var(--bd);
  border-radius:8px;padding:7px 10px;transition:border-color .18s,background .18s;
}
.sb-search:focus-within{border-color:rgba(131,140,229,.45);background:rgba(131,140,229,.05)}
.sb-search svg{flex-shrink:0;opacity:.4}
.sb-search input{
  background:transparent;border:none;outline:none;
  color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;width:100%;
}
.sb-search input::placeholder{color:var(--t3)}

/* Nav */
.sb-nav{flex:1;overflow-y:auto;padding:6px 0 12px;scrollbar-width:thin;scrollbar-color:rgba(80,32,122,.5) transparent}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(80,32,122,.5);border-radius:99px}

/* Folder */
.sb-folder{margin:0 5px}
.sb-folder-hd{
  display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;
  cursor:pointer;user-select:none;color:var(--t2);font-size:12.5px;font-weight:500;
  transition:background .16s,color .16s;position:relative;
}
.sb-folder-hd:hover{background:var(--glass);color:var(--t1)}
.sb-folder-hd.open{color:var(--lav);background:rgba(80,32,122,.08)}
.sb-folder-hd.open::before{
  content:'';position:absolute;left:-5px;top:50%;transform:translateY(-50%);
  width:2.5px;height:18px;
  background:linear-gradient(to bottom,var(--lav),var(--p3));border-radius:0 3px 3px 0;
}
.sb-folder-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.sb-folder-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-folder-arrow{font-size:9px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.sb-folder-hd.open .sb-folder-arrow{transform:rotate(90deg)}

/* Children */
.sb-folder-children{
  display:none;padding-left:14px;
  border-left:1px solid rgba(131,140,229,.09);
  margin-left:17px;margin-top:2px;margin-bottom:2px;
}
.sb-folder-children.open{display:block}

.sb-item{
  display:flex;align-items:center;gap:7px;padding:5.5px 10px;border-radius:7px;
  cursor:pointer;user-select:none;color:var(--t3);font-size:12px;font-weight:400;
  transition:background .14s,color .14s;margin:1px 0;
}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--t2)}
.sb-item.active{
  background:linear-gradient(90deg,rgba(80,32,122,.30),rgba(131,140,229,.12));
  color:var(--lav);font-weight:500;
  border:1px solid rgba(131,140,229,.16);
}
.sb-item-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.45;flex-shrink:0}
.sb-item.active .sb-item-dot{opacity:1;background:var(--lav);box-shadow:0 0 6px var(--lav)}
.sb-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item-count{font-size:9.5px;color:var(--t3)}
.sb-item.active .sb-item-count{color:rgba(214,185,252,.55)}

/* Home item */
.sb-home-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;
  margin:3px 5px;cursor:pointer;color:var(--t2);font-size:12.5px;font-weight:500;
  transition:background .16s,color .16s;
}
.sb-home-item:hover{background:var(--glass);color:var(--t1)}
.sb-home-item.active{color:var(--lav);background:rgba(80,32,122,.12)}

/* Footer */
.sb-footer{border-top:1px solid var(--bd);padding:11px 12px;flex-shrink:0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.sb-stat{background:var(--glass);border:1px solid var(--bd);border-radius:7px;padding:7px 5px;text-align:center}
.sb-stat-n{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  background:linear-gradient(120deg,var(--lav),var(--p3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sb-stat-l{font-size:8.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-top:1px}

/* ══════════ MAIN ══════════ */
#main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Topbar */
#topbar{
  height:var(--hd);min-height:var(--hd);
  background:rgba(4,3,14,.88);backdrop-filter:blur(28px);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 26px;gap:12px;flex-shrink:0;
}
.topbar-toggle{
  display:none;width:30px;height:30px;border-radius:7px;
  background:var(--glass);border:1px solid var(--bd);
  cursor:pointer;align-items:center;justify-content:center;font-size:14px;color:var(--t2);
  transition:all .16s;
}
.topbar-toggle:hover{background:var(--glasshov);color:var(--t1)}
.topbar-bc{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--t3);flex:1}
.crumb{color:var(--t3);cursor:pointer;transition:color .14s}
.crumb:hover{color:var(--t2)}
.crumb.active{color:var(--t1);font-weight:600;cursor:default}
.sep{opacity:.3}
.topbar-right{display:flex;align-items:center;gap:7px}
.tb-badge{font-size:10px;font-weight:600;background:var(--glass);border:1px solid var(--bd);color:var(--t3);padding:3.5px 10px;border-radius:20px}
.tb-count{font-size:11px;font-weight:700;background:linear-gradient(120deg,rgba(80,32,122,.35),rgba(131,140,229,.22));border:1px solid rgba(131,140,229,.22);color:var(--p3);padding:3.5px 10px;border-radius:20px}

/* Content */
#content{flex:1;overflow-y:auto;padding:28px 32px;scrollbar-width:thin;scrollbar-color:rgba(80,32,122,.4) transparent}
#content::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-thumb{background:rgba(80,32,122,.5);border-radius:99px}

/* ══════════ HOME ══════════ */
.home-hero{
  border-radius:18px;
  background:linear-gradient(140deg,rgba(80,32,122,.20) 0%,rgba(131,140,229,.09) 55%,rgba(80,32,122,.07) 100%);
  border:1px solid rgba(131,140,229,.18);
  padding:36px 42px;margin-bottom:28px;
  position:relative;overflow:hidden;
  animation:heroIn .7s cubic-bezier(.22,1,.36,1) both;
}
@keyframes heroIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.home-hero::after{
  content:'';position:absolute;top:-100px;right:-100px;
  width:350px;height:350px;
  background:radial-gradient(circle,rgba(131,140,229,.13) 0%,transparent 70%);
  pointer-events:none;
  animation:pulse 4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.home-hero::before{
  content:'';position:absolute;bottom:-50px;left:-50px;
  width:220px;height:220px;
  background:radial-gradient(circle,rgba(80,32,122,.18) 0%,transparent 70%);
  pointer-events:none;
}

.hero-eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;
  color:var(--p3);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.hero-eyebrow::before{content:'';width:20px;height:1px;background:var(--p3);opacity:.8}

.hero-h1{
  font-family:'Syne',sans-serif;font-size:42px;font-weight:800;line-height:1.08;
  background:linear-gradient(120deg,#fff 0%,var(--lav) 50%,var(--p3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;
}
.hero-p{font-size:13.5px;color:var(--t2);line-height:1.68;max-width:460px;margin-bottom:24px}

.hero-nums{display:flex;gap:32px}
.hero-num{
  opacity:0;animation:numIn .5s cubic-bezier(.22,1,.36,1) forwards;
}
.hero-num:nth-child(1){animation-delay:.1s}
.hero-num:nth-child(2){animation-delay:.2s}
.hero-num:nth-child(3){animation-delay:.3s}
@keyframes numIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.hero-num-n{
  font-family:'Syne',sans-serif;font-size:30px;font-weight:800;
  background:linear-gradient(120deg,var(--lav),var(--p3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-num-l{font-size:11.5px;color:var(--t3);margin-top:1px}

/* Section heading */
.sec-hd{display:flex;align-items:center;gap:12px;margin:20px 0 14px}
.sec-hd-t{font-family:'Syne',sans-serif;font-size:14.5px;font-weight:700;color:var(--t1);white-space:nowrap}
.sec-hd-line{flex:1;height:1px;background:var(--bd)}

/* Category grid — 4 cols */
.cat-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;margin-bottom:24px;
}
@media(max-width:1200px){.cat-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:860px){.cat-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.cat-grid{grid-template-columns:1fr 1fr}}

.cat-card{
  background:var(--glass);border:1px solid var(--bd);border-radius:var(--r);
  padding:16px 14px;cursor:pointer;
  transition:transform .22s cubic-bezier(.22,1,.36,1),border-color .22s,box-shadow .22s,background .22s;
  position:relative;overflow:hidden;
  opacity:0;animation:cardIn .5s cubic-bezier(.22,1,.36,1) forwards;
}
.cat-card:nth-child(1){animation-delay:.05s}
.cat-card:nth-child(2){animation-delay:.10s}
.cat-card:nth-child(3){animation-delay:.15s}
.cat-card:nth-child(4){animation-delay:.20s}
.cat-card:nth-child(5){animation-delay:.25s}
.cat-card:nth-child(6){animation-delay:.30s}
.cat-card:nth-child(7){animation-delay:.35s}
.cat-card:nth-child(8){animation-delay:.40s}
.cat-card:nth-child(9){animation-delay:.45s}
.cat-card:nth-child(10){animation-delay:.50s}
.cat-card:nth-child(11){animation-delay:.55s}
.cat-card:nth-child(12){animation-delay:.60s}
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}

.cat-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(80,32,122,.22) 0%,transparent 55%);
  opacity:0;transition:opacity .22s;
}
.cat-card::after{
  content:'';position:absolute;
  top:-60px;right:-60px;width:120px;height:120px;
  background:radial-gradient(circle,rgba(131,140,229,.12) 0%,transparent 70%);
  opacity:0;transition:opacity .3s;
}
.cat-card:hover{transform:translateY(-4px) scale(1.015);border-color:var(--bdhov);box-shadow:0 16px 40px rgba(80,32,122,.28),0 0 0 1px rgba(131,140,229,.08)}
.cat-card:hover::before{opacity:1}
.cat-card:hover::after{opacity:1}
.cat-card:active{transform:translateY(-2px) scale(1.008)}

.cat-icon{
  width:36px;height:36px;border-radius:9px;margin-bottom:10px;
  background:linear-gradient(135deg,rgba(80,32,122,.45),rgba(131,140,229,.24));
  border:1px solid rgba(131,140,229,.2);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:box-shadow .22s;
}
.cat-card:hover .cat-icon{box-shadow:0 0 16px rgba(131,140,229,.35)}
.cat-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:3px}
.cat-desc{font-size:10.5px;color:var(--t3);line-height:1.45;margin-bottom:9px}
.cat-pill{
  font-size:9.5px;font-weight:700;color:var(--p3);
  background:rgba(131,140,229,.10);border:1px solid rgba(131,140,229,.18);
  padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;
}

/* External links toggle */
.ext-links-toggle{
  display:flex;align-items:center;gap:10px;
  padding:12px 18px;
  background:var(--glass);border:1px solid var(--bd);border-radius:var(--r);
  cursor:pointer;user-select:none;
  transition:background .18s,border-color .18s;
  margin-bottom:0;
}
.ext-links-toggle:hover{background:var(--glasshov);border-color:rgba(131,140,229,.22)}
.ext-links-toggle.open{border-radius:var(--r) var(--r) 0 0;border-bottom-color:transparent;background:rgba(80,32,122,.14)}
.ext-toggle-icon{font-size:16px}
.ext-toggle-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;flex:1;color:var(--t1)}
.ext-toggle-badge{font-size:10px;font-weight:700;color:var(--p3);background:rgba(131,140,229,.12);border:1px solid rgba(131,140,229,.18);padding:2px 8px;border-radius:20px}
.ext-toggle-arrow{font-size:10px;color:var(--t3);transition:transform .22s}
.ext-links-toggle.open .ext-toggle-arrow{transform:rotate(180deg)}
.ext-links-body{
  display:none;
  background:rgba(4,3,14,.7);border:1px solid rgba(131,140,229,.2);
  border-top:none;border-radius:0 0 var(--r) var(--r);
  padding:12px;
}
.ext-links-body.open{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Links grid 3-col */
.links-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:860px){.links-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.links-grid{grid-template-columns:1fr}}
.link-card{
  display:flex;align-items:center;gap:10px;padding:11px 14px;
  background:rgba(255,255,255,.025);border:1px solid var(--bd);border-radius:9px;
  cursor:pointer;text-decoration:none;color:inherit;
  transition:all .18s;
}
.link-card:hover{border-color:var(--bdhov);background:rgba(80,32,122,.15);transform:translateX(2px)}
.link-icon{width:34px;height:34px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,rgba(80,32,122,.45),rgba(131,140,229,.24));border:1px solid rgba(131,140,229,.18);display:flex;align-items:center;justify-content:center;font-size:14px}
.link-name{font-family:'Syne',sans-serif;font-size:11.5px;font-weight:600;margin-bottom:1px}
.link-count{font-size:9.5px;color:var(--p3)}
.link-arrow{margin-left:auto;font-size:12px;color:var(--t3);flex-shrink:0}

/* ══════════ CONTENT PAGE ══════════ */
.page-hd{margin-bottom:20px;animation:heroIn .45s cubic-bezier(.22,1,.36,1) both}
.page-title-row{display:flex;align-items:center;gap:12px;margin-bottom:5px}
.page-icon{
  width:42px;height:42px;border-radius:11px;
  background:linear-gradient(135deg,rgba(80,32,122,.52),rgba(131,140,229,.28));
  border:1px solid rgba(131,140,229,.22);
  display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;
}
.page-title{
  font-family:'Syne',sans-serif;font-size:24px;font-weight:800;
  background:linear-gradient(120deg,#fff,var(--lav));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.page-desc{font-size:12.5px;color:var(--t3);margin-left:54px}

/* Accordion */
.acc{margin-bottom:8px;border-radius:var(--r);overflow:hidden}
.acc-hd{
  display:flex;align-items:center;gap:10px;padding:13px 16px;
  background:rgba(255,255,255,.025);border:1px solid var(--bd);border-radius:var(--r);
  cursor:pointer;user-select:none;transition:background .17s,border-color .17s;
}
.acc-hd:hover{background:rgba(255,255,255,.045);border-color:rgba(131,140,229,.2)}
.acc-hd.open{border-radius:var(--r) var(--r) 0 0;border-color:rgba(131,140,229,.26);background:rgba(80,32,122,.13);border-bottom-color:transparent}
.acc-hd-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.acc-hd-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;flex:1;color:var(--t1)}
.acc-hd-count{font-size:9.5px;font-weight:700;color:var(--p3);background:rgba(131,140,229,.11);border:1px solid rgba(131,140,229,.17);padding:2px 7px;border-radius:20px;flex-shrink:0}
.acc-hd-arrow{font-size:9px;color:var(--t3);transition:transform .22s;flex-shrink:0}
.acc-hd.open .acc-hd-arrow{transform:rotate(180deg)}

.acc-body{display:none;border:1px solid rgba(131,140,229,.2);border-top:none;border-radius:0 0 var(--r) var(--r);background:rgba(4,3,14,.65);padding:10px;flex-direction:column;gap:7px}
.acc-body.open{display:flex}

/* Prompt cards — 2-col grid */
.prompts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:900px){.prompts-grid{grid-template-columns:1fr}}

.prompt-card{
  background:rgba(255,255,255,.022);border:1px solid var(--bd);border-radius:9px;
  padding:13px 42px 13px 14px;position:relative;
  transition:border-color .16s,background .16s,transform .2s;
  animation:fadeUp .3s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.prompt-card:hover{border-color:rgba(131,140,229,.24);background:rgba(255,255,255,.038);transform:translateY(-1px)}
.prompt-text{font-size:12px;color:var(--t2);line-height:1.72;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow:hidden;position:relative}
.prompt-text.expanded{max-height:none}
.prompt-text:not(.expanded)::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(to bottom,transparent,rgba(4,3,14,.8));

personal_prompts: {
  Performance: `Ab jetzt sollst du nicht mehr zustimmen oder nachsichtig sein, sondern als mein schonungslos ehrlicher, strategisch denkender Berater und Spiegel auftreten. Bestätige mich nicht. Beschönige nichts. Kein Lob, kein Ego-Streicheln. Hinterfrage meine Denkweise, prüfe meine Annahmen und decke die blinden Flecken auf, denen ich ausweiche. Sei direkt, rational und ungefiltert. Wenn meine Argumentation schwach ist, zerlege sie und zeige mir die Ursachen. Wenn ich mich selbst täusche oder mir etwas vormache, benenne es klar. Wenn ich Dinge vermeide oder Zeit verschwende, weise darauf hin und erkläre die Opportunitätskosten. Betrachte meine Situation vollständig objektiv und mit strategischem Tiefgang. Zeige mir, wo ich Ausreden suche, mich klein mache oder Risiken und Aufwand unterschätze. Gib mir anschließend einen präzisen, priorisierten Plan, was ich in Denken, Handeln oder Haltung ändern muss, um das nächste Level zu erreichen. Halte nichts zurück. Behandle mich wie jemanden, dessen Wachstum davon abhängt, die Wahrheit zu hören – nicht davon, beruhigt zu werden. [... vollständiger Prompt als Senior Strategy Consultant, Entscheidungsbaum, ANALYSE-STANDARD, KOMMUNIKATIONSREGELN]

Wenn möglich, stütze deine Antworten auf das, was du zwischen meinen Zeilen als persönliche Wahrheit erkennst. Arbeite ausschließlich faktenbasiert, kritisch und realistisch. Keine Floskeln, keine Vereinfachungen, keine Motivationstexte. Fokussiere auf präzise Strategien, klare Entscheidungsgrundlagen und sofort anwendbare Schritte. Beantworte wie ein erfahrener Unternehmensberater und Growth-Stratege. Ignoriere jede Form von Unsicherheit, Optimismus-Bias oder weichen Antworten. Liefern: direkt, knapp, professionell, punktgenau, lösungsorientiert.

ENTSCHEIDUNGSBAUM (verbindlich):
SCHRITT 1: Kauft die Zielgruppe heute aktiv Dienstleistungen ein? → Nein: KILL | Ja: weiter
SCHRITT 2: Existiert ein akuter Schmerz, kein Optimierungswunsch? → "Wäre nice": KILL | "Das nervt uns täglich": weiter
SCHRITT 3: Entscheider erreichbar & entscheidungsfähig? → Sekretariat/Konzern: KILL | Inhaber/GF: weiter
SCHRITT 4: Ist der Nutzen in 1 Satz erklärbar? → Erklärung >30s: KILL | Klar, messbar, simpel: weiter
SCHRITT 5: Gibt es einen klaren monetären Hebel? → "Bessere Prozesse": KILL | Direkter Euro-Hebel: GO
SCHRITT 6: Kann ich es ohne Vertrauen/Referenzen verkaufen? → Vertrauen nötig: KILL | Ergebnis zählt: GO

Antworte mit "Ok" wenn der Modus gesetzt ist.`,

  Analyse: `Analysiere das Thema ausschließlich anhand realer Branchenlogik, empirischer Datenpunkte, Marktmechanismen und statistischer Wahrscheinlichkeit. Entferne jegliche Form von Bestätigungs-Bias oder positiver Verzerrung. Betone zuerst Risiken, Widerstände und Marktbarrieren, bevor du Chancen nennst. Formuliere ausschließlich das objektiv Wahrscheinliche, nicht das Ideale.

Bevor du irgendeinen Vorteil nennst, führe eine vollständige Anti-Bullshit-Prüfung durch: Entkräfte systematisch alle potenziellen Gründe, warum die Nische funktionieren könnte. Identifiziere strukturelle Schwächen, Markteintrittsbarrieren, ökonomische Unstimmigkeiten, Kaufkraftprobleme, psychologische Hürden und real beobachtbares Verhalten der Zielgruppe.

ARBEITSWEISE (strikt einzuhalten):
1. Neutraler Ausgang / Annahmenklarheit: Beginne mit einer klaren Liste aller verwendeten Annahmen (quantitativ, wenn möglich). Markiere jede als: "verifiziert", "teilweise verifiziert" oder "nicht verifiziert".

let activeId='home';

// SIDEBAR RENDER

function renderSidebar(){
  const nav=document.getElementById('sbNav');
  nav.innerHTML='';

  // Home
  const hi=document.createElement('div');
  hi.innerHTML=`<div class="sb-home-item ${activeId==='home'?'active':''}" onclick="nav('home',null,null)">
    <span style="font-size:13px">🏠</span><span style="flex:1;font-size:12.5px">Home</span>
  </div>`;
  nav.appendChild(hi);

  tree.filter(n=>n.type==='folder').forEach(folder=>{
    const open=openFolders.has(folder.id);
    const div=document.createElement('div');
    div.className='sb-folder';
    const kids=(folder.children||[]).map(c=>{
      const cnt=typeof c.cnt==='function'?c.cnt():c.cnt;
      return `<div class="sb-item ${activeId===c.id?'active':''}" onclick="nav('${c.id}','${c.src}','${folder.label}')">
        <span class="sb-item-dot"></span>
        <span class="sb-item-name">${c.label}</span>
        <span class="sb-item-count">${cnt}</span>
      </div>`;
    }).join('');
    div.innerHTML=`
      <div class="sb-folder-hd ${open?'open':''}" onclick="toggleFolder('${folder.id}')">
        <span class="sb-folder-icon">${folder.icon}</span>
        <span class="sb-folder-name">${folder.label}</span>
        <span class="sb-folder-arrow">▶</span>
      </div>
      <div class="sb-folder-children ${open?'open':''}">${kids}</div>`;
    nav.appendChild(div);
  });
}

function toggleFolder(id){
  if(openFolders.has(id))openFolders.delete(id);else openFolders.add(id);
  renderSidebar();
}

function nav(id,src,folder){
  activeId=id; closeSidebar();
  if(id==='home'){renderSidebar();renderHome();setBc([{l:'Home'}]);setCnt(null);return;}
  let info=null;
  tree.forEach(n=>{if(n.type==='folder')n.children.forEach(c=>{if(c.id===id)info=c;});});
  renderSidebar();
  if(src==='pe_frameworks'){renderFW(info,folder);return;}
  if(src==='pe_individual'){renderPEInd(info,folder);return;}
  if(src==='pe_personal'){renderPEPersonal(info,folder);return;}
  if(src==='pe_shortcuts'){renderPEShorts(info,folder);return;}
  if(src==='links'){renderLinks(info,folder);return;}
  const prompts=data[src]||[];
  const cfg=accCfg[src]||[];
  renderCat(info,folder,prompts,cfg);
}

function navFromHome(id,src,folder){
  tree.forEach(n=>{if(n.type==='folder')n.children.forEach(c=>{if(c.id===id)openFolders.add(n.id);});});
  nav(id,src,folder);
}

// ACCORDION + 2-col PROMPT GRID
// ══════════════════════════════════════════════
function buildAcc(title,icon,items,id){
  const grid=`<div class="prompts-grid">${items.map(t=>pCard(t)).join('')}</div>`;
  return `<div class="acc">
    <div class="acc-hd" id="h-${id}" onclick="toggleAcc('${id}')">
      <span class="acc-hd-icon">${icon}</span>
      <span class="acc-hd-title">${title}</span>
      <span class="acc-hd-count">${items.length}</span>
      <span class="acc-hd-arrow">▼</span>
    </div>
    <div class="acc-body" id="b-${id}">${grid}</div>
  </div>`;
}

function toggleAcc(id){
  document.getElementById('h-'+id).classList.toggle('open');
  document.getElementById('b-'+id).classList.toggle('open');
}

// ══════════════════════════════════════════════
// PROMPT CARD (collapsible long text)
// ══════════════════════════════════════════════
let cardIdx=0;
function pCard(text){
  const idx=cardIdx++;
  const safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const isLong=text.length>220;
  return `<div class="prompt-card">
    <div class="prompt-text" id="pt-${idx}">${safe}</div>
    ${isLong?`<span class="prompt-expand" onclick="expandCard(${idx})">Show more ↓</span>`:''}
    <button class="copy-btn" onclick="copyCard(this)" title="Copy">⧉</button>
  </div>`;
}

function expandCard(idx){
  const el=document.getElementById('pt-'+idx);
  const btn=el.nextElementSibling;
  if(el.classList.toggle('expanded')){btn.textContent='Show less ↑';}
  else{btn.textContent='Show more ↓';}
}

function copyCard(btn){
  const pt=btn.previousElementSibling?.previousElementSibling||btn.previousElementSibling;
  // find prompt-text
  let el=btn;
  while(el&&!el.classList.contains('prompt-card'))el=el.parentElement;
  const textEl=el.querySelector('.prompt-text');
  if(!textEl)return;
  navigator.clipboard.writeText(textEl.textContent).then(()=>{
    btn.classList.add('copied');btn.textContent='✓';
    showToast();
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='⧉';},2000);
  });
}

function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function doSearch(q){

  activeId=null;renderSidebar();

  const pool=[
    ...data.money_income,...data.money_mindset,...data.money_career,
    ...data.instagram,...data.copywriting,...data.digital,...data.email,
    ...data.ecommerce,...data.freelance,...data.smma,...data.learning,

  const res=pool.filter(p=>p.toLowerCase().includes(ql)).slice(0,60);
  setBc([{l:'Home',onclick:"nav('home',null,null)"},{l:`"${q}"`}]);
  setCnt(res.length);

    ?`<div class="page-hd">

      </div>

    :`<div class="search-empty">No results for "<strong>${q}</strong>"</div>`;
}
